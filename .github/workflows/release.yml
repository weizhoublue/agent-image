name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-smoke:
    name: Build and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate multi-arch build (no push)
        uses: docker/build-push-action@v6
        with:
          context: images
          platforms: ${{ env.PLATFORMS }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release-validate-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build linux/amd64 for smoke (load into daemon)
        uses: docker/build-push-action@v6
        with:
          context: images
          platforms: linux/amd64
          push: false
          load: true
          tags: agent-image:release-smoke-amd64-${{ github.sha }}
          cache-from: type=gha

      - name: Smoke test (linux/amd64)
        run: |
          chmod +x scripts/ci-smoke.sh
          SMOKE_TIMEOUT=900 ./scripts/ci-smoke.sh "agent-image:release-smoke-amd64-${{ github.sha }}"

      - name: Build linux/arm64 for smoke (load into daemon)
        uses: docker/build-push-action@v6
        with:
          context: images
          platforms: linux/arm64
          push: false
          load: true
          tags: agent-image:release-smoke-arm64-${{ github.sha }}
          cache-from: type=gha

      - name: Smoke test (linux/arm64)
        run: |
          chmod +x scripts/ci-smoke.sh
          SMOKE_PLATFORM=linux/arm64 SMOKE_TIMEOUT=900 \
            ./scripts/ci-smoke.sh "agent-image:release-smoke-arm64-${{ github.sha }}"

  publish:
    name: Push image to GHCR
    needs: build-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch manifest
        uses: docker/build-push-action@v6
        with:
          context: images
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
